name: Sync & Build Docker Image

on:
  schedule:
    # 每天 UTC 0点（北京时间 8点）检查更新
    - cron: '0 0 * * *'
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  sync-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/ringhyacinth/Star-Office-UI.git || true
          git fetch upstream

      - name: Check for updates
        id: check
        run: |
          behind=$(git rev-list --count origin/master..upstream/master)
          echo "behind=$behind" >> $GITHUB_OUTPUT
          if [ "$behind" -gt 0 ]; then
            echo "有新更新: $behind 个 commits"
          else
            echo "没有新更新"
          fi

      - name: Merge upstream
        if: steps.check.outputs.behind != '0'
        run: |
          git checkout master
          git merge upstream/master --no-edit
          git checkout --theirs .
          git add -A
          git commit -m "Merge upstream updates" || true

      - name: Set up Docker Buildx
        if: steps.check.outputs.behind != '0'
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        if: steps.check.outputs.behind != '0'
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: star-office-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Save image as artifact
        if: steps.check.outputs.behind != '0'
        run: |
          docker save star-office-ui:latest -o star-office-ui.tar
          gzip star-office-ui.tar

      - name: Upload artifact
        if: steps.check.outputs.behind != '0'
        uses: actions/upload-artifact@v4
        with:
          name: star-office-ui-image
          path: star-office-ui.tar.gz
          retention-days: 7

      - name: Commit and push
        if: steps.check.outputs.behind != '0'
        run: |
          git push origin master

      - name: Create release tag
        if: steps.check.outputs.behind != '0'
        run: |
          TAG=v$(date +%Y%m%d-%H%M%S)
          git tag $TAG
          git push origin $TAG