services:
  star-office-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: star-office-ui
    restart: unless-stopped
    ports:
      - "19000:19000"
      - "80:80"
    environment:
      - ASSET_DRAWER_PASS=888
      - FLASK_SECRET_KEY=changeme
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3