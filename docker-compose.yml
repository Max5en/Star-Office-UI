services:
  star-office-ui:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: star-office-ui
    restart: unless-stopped
    ports:
      - "19000:19000"
    environment:
      - ASSET_DRAWER_PASS=438516720
      - FLASK_SECRET_KEY=changeme
    volumes:
      - ./memory:/app/memory:ro
    healthcheck:
      test: ["CMD", "wget", "-spider", "-q", "http://localhost:19000"]
      interval: 30s
      timeout: 10s
      retries: 3