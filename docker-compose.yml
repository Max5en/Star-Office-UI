version: '3.8'

services:
  star-office-ui:
    image: star-office-ui:latest
    container_name: star-office-ui
    restart: unless-stopped
    ports:
      - "19000:19000"
      - "80:80"
    environment:
      - ASSET_DRAWER_PASS=438516720
      - FLASK_SECRET_KEY=changeme_replace_with_random
    volumes:
      - ./state.json:/app/state.json:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  default:
    driver: bridge