services:
  star-office-ui:
    image: ghcr.io/max5en/star-office-ui:latest
    container_name: star-office-ui
    restart: unless-stopped
    ports:
      - "19000:19000"
      - "32821:80"
    environment:
      - ASSET_DRAWER_PASS=438516720
      - FLASK_SECRET_KEY=changeme
    volumes:
      - ./state.json:/app/state.json:ro
    healthcheck:
      test: ["CMD", "wget", "-spider", "-q", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3